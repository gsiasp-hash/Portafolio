  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

,.14);padding:36px;cursor:pointer;transition:border-color .25s,background .25s\" style-hover=\"border-color:rgba(139,92,246,.45);background:rgba(15,23,42,.9)\">\n        <div style=\"display:flex;justify-content:space-between;align-items:start;margin-bottom:24px\">\n          <span style=\"font-size:10px;color:#8b5cf6;border:1px solid rgba(139,92,246,.3);padding:4px 12px;letter-spacing:2px\">AUDIO<\u002Fspan>\n          <span style=\"color:#1e1b4b;font-size:18px;transition:color .2s\">→<\u002Fspan>\n        <\u002Fdiv>\n        <h3 style=\"font-size:20px;font-weight:700;color:#fff;margin:0 0 12px;line-height:1.2\">Mezcla &amp; Mastering EP<\u002Fh3>\n        <p style=\"color:#64748b;font-size:13px;line-height:1.8;margin:0 0 28px\">Producción, mezcla y masterización de EP de 5 pistas. Flujo de trabajo híbrido: procesamiento digital + analógico.<\u002Fp>\n        <div style=\"display:flex;gap:8px;flex-wrap:wrap\">\n          <span style=\"font-size:11px;color:#818cf8;background:rgba(139,92,246,.07);padding:5px 12px\">Pro Tools<\u002Fspan>\n          <span style=\"font-size:11px;color:#818cf8;background:rgba(139,92,246,.07);padding:5px 12px\">Waves<\u002Fspan>\n          <span style=\"font-size:11px;color:#818cf8;background:rgba(139,92,246,.07);padding:5px 12px\">iZotope<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- P2: AUDIO -->\n      <div style=\"background:rgba(15,23,42,.7);border:1px solid rgba(139,92,246,.14);padding:36px;cursor:pointer;transition:border-color .25s,background .25s\" style-hover=\"border-color:rgba(139,92,246,.45);background:rgba(15,23,42,.9)\">\n        <div style=\"display:flex;justify-content:space-between;align-items:start;margin-bottom:24px\">\n          <span style=\"font-size:10px;color:#8b5cf6;border:1px solid rgba(139,92,246,.3);padding:4px 12px;letter-spacing:2px\">AUDIO<\u002Fspan>\n          <span style=\"color:#1e1b4b;font-size:18px\">→<\u002Fspan>\n        <\u002Fdiv>\n        <h3 style=\"font-size:20px;font-weight:700;color:#fff;margin:0 0 12px;line-height:1.2\">Sound Design Cortometraje<\u002Fh3>\n        <p style=\"color:#64748b;font-size:13px;line-height:1.8;margin:0 0 28px\">Diseño sonoro completo: Foley, efectos de sonido sintéticos, diseño de ambiente y música incidental para ficción.<\u002Fp>\n        <div style=\"display:flex;gap:8px;flex-wrap:wrap\">\n          <span style=\"font-size:11px;color:#818cf8;background:rgba(139,92,246,.07);padding:5px 12px\">Ableton<\u002Fspan>\n          <span style=\"font-size:11px;color:#818cf8;background:rgba(139,92,246,.07);padding:5px 12px\">Max/MSP<\u002Fspan>\n          <span style=\"font-size:11px;color:#818cf8;background:rgba(139,92,246,.07);padding:5px 12px\">Reaper<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- P3: DEV -->\n      <div style=\"background:rgba(5,46,22,.6);border:1px solid rgba(163,230,53,.1);padding:36px;cursor:pointer;transition:border-color .25s,background .25s\" style-hover=\"border-color:rgba(163,230,53,.38);background:rgba(5,46,22,.9)\">\n        <div style=\"display:flex;justify-content:space-between;align-items:start;margin-bottom:24px\">\n          <span style=\"font-size:10px;color:#a3e635;border:1px solid rgba(163,230,53,.28);padding:4px 12px;letter-spacing:2px\">DEV<\u002Fspan>\n          <span style=\"color:#1e1b4b;font-size:18px\">→<\u002Fspan>\n        <\u002Fdiv>\n        <h3 style=\"font-size:20px;font-weight:700;color:#fff;margin:0 0 12px;line-height:1.2\">[ Tu proyecto web ]<\u002Fh3>\n        <p style=\"color:#64748b;font-size:13px;line-height:1.8;margin:0 0 28px\">Reemplaza con tu proyecto real. App, sitio web, API, herramienta. Descríbelo con sus objetivos y tecnologías usadas.<\u002Fp>\n        <div style=\"display:flex;gap:8px;flex-wrap:wrap\">\n          <span style=\"font-size:11px;color:#818cf8;background:rgba(163,230,53,.05);padding:5px 12px\">React<\u002Fspan>\n          <span style=\"font-size:11px;color:#818cf8;background:rgba(163,230,53,.05);padding:5px 12px\"> 6,23,.5)\">\n  <div style=\"max-width:1200px;margin:0 auto\">\n    <p style=\"font-size:11px;color:#8b5cf6;letter-spacing:4px;margin:0 0 14px;opacity:.8\">// 04_CONTACT<\u002Fp>\n    <h2 style=\"font-size:38px;font-weight:700;margin:0 0 10px;color:#fff\">Hablemos<\u002Fh2>\n    <p style=\"color:#64748b;font-size:14px;margin:0 0 56px;line-height:1.8\">¿Proyecto de audio? ¿Colaboración en desarrollo?<br>¿O simplemente quieres saludar?<\u002Fp>\n\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:52px\">\n\n      <!-- Links -->\n      <div style=\"display:flex;flex-direction:column;gap:10px\">\n        <a href=\"mailto:tu@email.com\" style=\"display:flex;align-items:center;gap:18px;padding:20px 24px;border:1px solid rgba(139,92,246,.14);transition:all .2s\" style-hover=\"border-color:rgba(139,92,246,.42);background:rgba(139,92,246,.05)\">\n          <span style=\"color:#8b5cf6;font-size:18px;width:24px;text-align:center\">✉<\u002Fspan>\n          <div>\n            <p style=\"font-size:10px;color:#334155;letter-spacing:2px;margin:0 0 3px\">EMAIL<\u002Fp>\n            <p style=\"font-size:13px;color:#c4b5fd;margin:0\">tu@email.com<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fa>\n        <a href=\"https://linkedin.com/in/guillermosias\" target=\"_blank\" style=\"display:flex;align-items:center;gap:18px;padding:20px 24px;border:1px solid rgba(139,92,246,.14);transition:all .2s\" style-hover=\"border-color:rgba(139,92,246,.42);background:rgba(139,92,246,.05)\">\n          <span style=\"color:#8b5cf6;font-size:15px;font-weight:700;width:24px;text-align:center\">in<\u002Fspan>\n          <div>\n            <p style=\"font-size:10px;color:#334155;letter-spacing:2px;margin:0 0 3px\">LINKEDIN<\u002Fp>\n            <p style=\"font-size:13px;color:#c4b5fd;margin:0\">/in/guillermosias<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fa>\n        <a href=\"https://github.com/guillermosias\" target=\"_blank\" style=\"display:flex;align-items:center;gap:18px;padding:20px 24px;border:1px solid rgba(139,92,246,.14);transition:all .2s\" style-hover=\"border-color:rgba(139,92,246,.42);background:rgba(139,92,246,.05)\">\n          <span style=\"color:#8b5cf6;font-size:14px;font-weight:700;width:24px;text-align:center\">gh<\u002Fspan>\n          <div>\n            <p style=\"font-size:10px;color:#334155;letter-spacing:2px;margin:0 0 3px\">GITHUB<\u002Fp>\n            <p style=\"font-size:13px;color:#c4b5fd;margin:0\">@guillermosias<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fa>\n      <\u002Fdiv>\n\n      <!-- Form -->\n      <form onsubmit=\"return false\" style=\"display:flex;flex-direction:column;gap:12px\">\n        <input type=\"text\" placeholder=\"Tu nombre\" style=\"background:rgba(15,23,42,.8);border:1px solid rgba(139,92,246,.18);color:#ede9fe;padding:15px 18px;font-size:13px;transition:border-color .2s\">\n        <input type=\"email\" placeholder=\"tu@email.com\" style=\"background:rgba(15,23,42,.8);border:1px solid rgba(139,92,246,.18);color:#ede9fe;padding:15px 18px;font-size:13px;transition:border-color .2s\">\n        <textarea placeholder=\"Tu mensaje...\" rows=\"4\" style=\"background:rgba(15,23,42,.8);border:1px solid rgba(139,92,246,.18);color:#ede9fe;padding:15px 18px;font-size:13px;resize:vertical;transition:border-color .2s\"><\u002Ftextarea>\n        <button type=\"submit\" style=\"background:#8b5cf6;color:#fff;border:none;padding:15px;font-family:'Space Mono',monospace;font-size:12px;cursor:pointer;letter-spacing:3px;transition:background .2s\" style-hover=\"background:#7c3aed\">ENVIAR →<\u002Fbutton>\n      <\u002Fform>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ── FOOTER ──────────────────────────────────────────── -->\n<footer style=\"padding:32px 48px;border-top:1px solid rgba(139,92,246,.1)\">\n  <div style=\"max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:center\">\n    <p style=\"color:#1e1b4b;font-size:11px;margin:0;letter-spacing:1px\">© 2026 GUILLERMO SIAS — audio &amp; code<\u002Fp>\n    <p style=\"color:#1e1b4b;font-size:11px;margin:0;letter-spacing:1px\">// hecho con código + oído<\u002Fp>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1440,&quot;height&quot;:900}}\">\n\nclass Component extends DCLogic {\n  state = { typedText: '', navScrolled: false };\n\n  roles = ['Ingeniero en Sonido.', 'Full Stack Developer.'];\n  charIndex = 0;\n  roleIndex = 0;\n  isDeleting = false;\n  _typeTimeout = null;\n\n  componentDidMount() {\n    setTimeout(() => this.typeLoop(), 700);\n    window.addEventListener('scroll', this.handleScroll, { passive: true });\n  }\n\n  componentWillUnmount() {\n    clearTimeout(this._typeTimeout);\n    window.removeEventListener('scroll', this.handleScroll);\n  }\n\n  handleScroll = () => {\n    const scrolled = window.scrollY > 55;\n    if (scrolled !== this.state.navScrolled) this.setState({ navScrolled: scrolled });\n  };\n\n  typeLoop() {\n    const role = this.roles[this.roleIndex];\n    if (!this.isDeleting) {\n      this.charIndex++;\n      this.setState({ typedText: role.substring(0, this.charIndex) });\n      if (this.charIndex === role.length) {\n        this._typeTimeout = setTimeout(() => { this.isDeleting = true; this.typeLoop(); }, 2600);\n        return;\n      }\n    } else {\n      this.charIndex--;\n      this.setState({ typedText: role.substring(0, this.charIndex) });\n      if (this.charIndex === 0) {\n        this.isDeleting = false;\n        this.roleIndex = (this.roleIndex + 1) % this.roles.length;\n      }\n    }\n    this._typeTimeout = setTimeout(() => this.typeLoop(), this.isDeleting ? 42 : 92);\n  }\n\n  scrollTo(id) {\n    const el = document.getElementById(id);\n    if (el) window.scrollTo({ top: el.getBoundingClientRect().top + window.scrollY - 72, behavior: 'smooth' });\n  }\n\n  renderVals() {\n    const { typedText, navScrolled } = this.state;\n\n    const navStyle = {\n      position: 'fixed', top: 0, left: 0, right: 0, zIndex: 100,\n      padding: '16px 48px',\n      transition: 'background 0.4s, border-color 0.4s',\n      backdropFilter: 'blur(20px)',\n      WebkitBackdropFilter: 'blur(20px)',\n      background: navScrolled ? 'rgba(2,6,23,0.93)' : 'rgba(2,6,23,0)',\n      borderBottom: `1px solid ${navScrolled ? 'rgba(139,92,246,0.2)' : 'transparent'}`,\n    };\n\n    const mkAudio = (name, pct) => ({\n      name, pct: pct + '%',\n      fillStyle: { height: '100%', width: pct + '%', background: 'linear-gradient(90deg,#1e1b4b,#8b5cf6)', borderRadius: '2px' },\n    });\n\n    const mkDev = (name, pct) => ({\n      name, pct: pct + '%',\n      fillStyle: { height: '100%', width: pct + '%', background: 'linear-gradient(90deg,#14532d,#a3e635)', borderRadius: '2px' },\n    });\n\n    const audioSkills = [\n      mkAudio('Pro Tools', 85),\n      mkAudio('Ableton Live', 78),\n      mkAudio('Logic Pro', 70),\n      mkAudio('Mezcla & Mastering', 80),\n      mkAudio('Max/MSP', 55),\n    ];\n\n    const devSkills = [\n      mkDev('JavaScript / ES6+', 72),\n      mkDev('React', 65),\n      mkDev('Node.js', 60),\n      mkDev('Python', 55),\n      mkDev('SQL / PostgreSQL', 58),\n    ];\n\n    const waveformBars = Array.from({ length: 52 }, (_, i) => {\n      const h = Math.abs(\n        Math.sin(i * 0.38) * Math.cos(i * 0.21) * 0.62 +\n        Math.sin(i * 0.71) * 0.28 +\n        Math.cos(i * 0.15) * 0.1\n      ) * 170 + 12;\n      return {\n        style: {\n          width: '4px',\n          flexShrink: '0',\n          height: Math.round(h) + 'px',\n          background: `oklch(0.55 0.2 ${274 + (i % 13) * 2.2})`,\n          borderRadius: '2px',\n          transformOrigin: 'bottom',\n          animation: `waveBar ${(0.58 + (i % 8) * 0.105).toFixed(2)}s ease-in-out ${(i * 0.032).toFixed(3)}s infinite`,\n        }\n      };\n    });\n\n    return {\n      typedText,\n      navStyle,\n      audioSkills,\n      devSkills,\n      waveformBars,\n      goAbout:    () => this.scrollTo('about'),\n      goSkills:   () => this.scrollTo('skills'),\n      goProjects: () => this.scrollTo('projects'),\n      goContact:  () => this.scrollTo('contact'),\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
